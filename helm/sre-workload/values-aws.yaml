# Overlay for AWS (EKS). Apply with:
#   helm install sre-workload ./sre-workload -f values.yaml -f values-aws.yaml \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=<IRSA_ROLE_ARN> \
#     --set ingress.host=sre.example.com

serviceAccount:
  # Supply the IRSA role ARN at install time if the workload needs AWS API access:
  #   --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=<IRSA_ROLE_ARN>
  # Omit the annotation entirely if no IAM role is required — an empty string
  # annotation is written to the ServiceAccount but creates no IAM binding and
  # misleadingly implies one exists.
  annotations: {}

storageClassName: gp3

ingress:
  enabled: true
  className: nginx # default choice for portability; set to "alb" and add
                    # alb.ingress.kubernetes.io/* annotations if the
                    # customer wants native ALB integration instead
  annotations:
    # cert-manager: request a certificate from the letsencrypt-prod
    # ClusterIssuer created by modules/k8s-platform. cert-manager creates
    # the TLS Secret named by ingress.tls.secretName automatically.
    # Switch to letsencrypt-staging to test ACME configuration first.
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: sre-workload-tls

nodeSelector:
  kubernetes.io/os: linux
