{{- if and .Values.gateway.enabled .Values.gateway.tls.enabled }}
{{- $tlsSecret := default (printf "%s-tls" (include "sre-workload.fullname" .)) .Values.gateway.tls.secretName }}
# cert-manager Certificate — provisions the TLS Secret referenced by the
# Gateway HTTPS listener. Requires cert-manager with a ClusterIssuer or
# Issuer matching gateway.tls.issuerName (created by modules/k8s-platform
# when acme_email is set). For Ingress-based TLS, cert-manager is driven by
# the ingress annotation instead; this resource is only created in Gateway mode.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "sre-workload.fullname" . }}-tls
  labels:
    {{- include "sre-workload.labels" . | nindent 4 }}
spec:
  secretName: {{ $tlsSecret | quote }}
  issuerRef:
    name: {{ .Values.gateway.tls.issuerName }}
    kind: {{ .Values.gateway.tls.issuerKind }}
  dnsNames:
    - {{ required "gateway.host is required when gateway.tls.enabled=true" .Values.gateway.host | quote }}
{{- end }}
