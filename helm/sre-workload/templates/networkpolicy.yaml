{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sre-workload.fullname" . }}
  labels:
    {{- include "sre-workload.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sre-workload.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowFromAnywhereInCluster }}
    # Explicit opt-out of namespace scoping — allow traffic on the app port
    # from any pod in-cluster.
    - from: []
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    {{- else }}
    # Scoped to the ingress-controller / gateway namespaces by default
    # (see networkPolicy.allowedIngressNamespaces) instead of the whole
    # cluster. Set networkPolicy.allowFromAnywhereInCluster=true if the
    # real traffic source can't be expressed this way.
    {{- range .Values.networkPolicy.allowedIngressNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.targetPort }}
    {{- end }}
    {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS is always required regardless of what else the workload talks to.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
