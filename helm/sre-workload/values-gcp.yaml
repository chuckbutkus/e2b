# Overlay for GCP (GKE). Apply with:
#   helm install sre-workload ./sre-workload -f values.yaml -f values-gcp.yaml \
#     --set serviceAccount.annotations."iam\.gke\.io/gcp-service-account"=<GSA_EMAIL> \
#     --set ingress.host=sre.example.com

serviceAccount:
  annotations:
    # Populated by Terraform output (modules/workload-identity) at deploy time.
    iam.gke.io/gcp-service-account: ""

storageClassName: standard-rwo # pd-ssd backed dynamic provisioning on GKE

ingress:
  enabled: true
  className: nginx # default choice for portability; GKE-native Gateway API
                    # is documented as an alternative in docs/ARCHITECTURE.md
  annotations:
    # cert-manager: request a certificate from the letsencrypt-prod
    # ClusterIssuer created by modules/k8s-platform. cert-manager creates
    # the TLS Secret named by ingress.tls.secretName automatically.
    # Switch to letsencrypt-staging to test ACME configuration first.
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: sre-workload-tls

nodeSelector:
  kubernetes.io/os: linux
