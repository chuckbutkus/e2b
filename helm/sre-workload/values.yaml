# Default values for sre-workload.
# Cloud-specific overrides live in values-aws.yaml / values-gcp.yaml and are
# merged on top of this file with `-f values.yaml -f values-<cloud>.yaml`.

image:
  repository: ghcr.io/e2b-dev/sre-interview
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: ghcr-pull-secret   # only needed if the image is/becomes private

nameOverride: ""
fullnameOverride: ""

replicaCount: 3

# -----------------------------------------------------------------------
# Confirmed against the running image (docker run + curl):
#   - Port 8080 is the app port. All paths return 200 (catch-all), so
#     /healthz and /readyz aren't differentiated health checks — they're
#     just liveness-of-process signals. Still valid for k8s probes since
#     only the status code is checked.
#   - Port 9090 ("internal server" per container logs) is a real router
#     but its purpose is unconfirmed (not /metrics, not standard pprof).
#     Deliberately NOT exposed anywhere in this chart — see README.
# -----------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

probes:
  type: http # http | tcp | exec
  path: /healthz
  readyPath: /readyz
  startup:
    failureThreshold: 30 # 30 * 5s = 150s to boot before killed
    periodSeconds: 5
  readiness:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  # scale-down slower than scale-up so we don't flap under bursty load
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

podDisruptionBudget:
  enabled: true
  minAvailable: 1

rollout:
  strategy: RollingUpdate
  maxUnavailable: 0
  maxSurge: 25%

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway # DoNotSchedule is stricter but risks
                                    # unschedulable pods on small/dev clusters

serviceAccount:
  create: true
  name: ""
  annotations: {} # populated per-cloud (IRSA role ARN / GCP SA email)
  # Opt-in: set true only if the workload itself needs to call the
  # Kubernetes API. IRSA (AWS) and Workload Identity (GCP) inject their
  # own projected tokens via the pod-identity webhook and the GKE metadata
  # server respectively — neither requires the default SA token mount.
  automountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

networkPolicy:
  enabled: true
  # Ingress is scoped by default to pods running in these namespaces —
  # the ingress-nginx and nginx-gateway namespaces this repo's Terraform
  # k8s-platform module installs into — rather than allowed from anywhere
  # in the cluster. Standard namespaces carry the kubernetes.io/metadata.name
  # label automatically (k8s 1.21+), which is what the template selects on.
  # Override this list for BYO-cluster environments where the ingress
  # controller/gateway lives in a different namespace.
  allowedIngressNamespaces:
    - ingress-nginx
    - nginx-gateway
  # Escape hatch: allow ingress from any pod in-cluster instead of scoping
  # by namespace. Only turn this on if the real traffic source can't be
  # expressed as a namespace selector (e.g. a caller in an unpredictable
  # namespace) — prefer extraIngress with a precise selector instead where
  # possible.
  allowFromAnywhereInCluster: false
  # Extra ingress/egress rules layered on top of the baseline above.
  # Empty by default; customers/environments add what the workload actually
  # needs to talk to (DNS egress is always allowed, see templates).
  extraIngress: []
  extraEgress: []

ingress:
  enabled: false # off by default; each cloud overlay/customer turns this on
                  # with their own ingressClassName + TLS config
  className: nginx
  annotations: {}
  host: ""
  tls:
    enabled: false
    secretName: ""

# Gateway API mode — alternative to Ingress; requires NGINX Gateway Fabric
# (install_nginx_gateway_fabric=true in Terraform) and the Gateway API CRDs.
# Use values-{aws,gcp}-gateway.yaml overlays instead of values-{aws,gcp}.yaml
# to deploy in Gateway API mode. Ingress and gateway are not mutually exclusive
# but enabling both is unusual; set ingress.enabled=false when using gateway.
gateway:
  enabled: false
  # GatewayClass name installed by NGINX Gateway Fabric ("nginx" by default).
  className: nginx
  # Hostname this Gateway and HTTPRoute serve. Required when gateway.enabled=true.
  host: ""
  # createGateway=true: this chart owns a Gateway resource (one per workload).
  # createGateway=false: the HTTPRoute attaches to a pre-existing shared Gateway;
  #   supply parentRef.name (and parentRef.namespace if cross-namespace) instead.
  createGateway: true
  parentRef:
    name: ""
    namespace: ""  # empty = same namespace as the HTTPRoute
    sectionName: ""  # optional: pin to a specific listener (e.g. "https")
  tls:
    enabled: false
    # Secret name cert-manager writes the TLS certificate to.
    # Defaults to <fullname>-tls when empty.
    secretName: ""
    # ClusterIssuer created by modules/k8s-platform (acme_email must be set).
    issuerName: letsencrypt-prod
    issuerKind: ClusterIssuer

serviceMonitor:
  enabled: false # requires Prometheus Operator CRDs; opt-in only
  interval: 30s
  path: /metrics

# storageClassName override; empty = cluster default. Only relevant if a
# future revision of this chart adds a PVC (workload is currently assumed
# stateless — TODO(confirm-against-image)).
storageClassName: ""

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
# - name: LOG_LEVEL
#   value: info

extraEnvFrom: []
# - configMapRef:
#     name: sre-workload-extra-config
